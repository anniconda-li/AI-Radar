name: ai-radar-local

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_radar
      MYSQL_USER: ai_radar
      MYSQL_PASSWORD: ai_radar_local
      MYSQL_ROOT_PASSWORD: root_local
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ai-radar-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  ai-radar-mysql-data:
