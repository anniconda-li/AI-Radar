name: ai-radar-local

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_radar
      MYSQL_USER: ai_radar
      MYSQL_PASSWORD: ai_radar_local
      MYSQL_ROOT_PASSWORD: root_local
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ai-radar-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  backend:
    image: ai-radar-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://db:3306/ai_radar?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ai_radar
      DB_PASSWORD: ai_radar_local
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent --show-error --output /dev/null http://127.0.0.1:8080/api/providers",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: ai-radar-frontend:local
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  ai-radar-mysql-data:
