spring.application.name=ai-radar-api

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/ai_radar?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:ai_radar}
spring.datasource.password=${DB_PASSWORD:ai_radar_local}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
